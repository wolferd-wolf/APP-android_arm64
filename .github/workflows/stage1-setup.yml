name: Stage 1 - Repo layout + toolchain setup (no compile yet)

# Manual trigger only. This is exploratory - we are not ready to run this
# automatically on every push. Run it by hand from the Actions tab.
on:
  workflow_dispatch:
    inputs:
      note:
        description: "Why are you running this (for the report log)"
        required: false
        default: "manual test run"

permissions:
  contents: write

jobs:
  setup:
    runs-on: windows-latest
    steps:
      # ---- Shared transcript file. IMPORTANT: each Actions step runs in a
      # brand new process, so Start-Transcript in one step does NOT persist
      # into later steps - it only survives within a single step's own
      # process. So instead of one Start/Stop spanning the whole job, each
      # step below that matters opens its own Start-Transcript(-Append) /
      # Stop-Transcript pair, all pointed at the same shared file. The file
      # itself does persist across steps (it's just a file on disk); only
      # the transcript *session state* doesn't.
      - name: Init transcript file
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\transcript" | Out-Null
          "=== Stage 1 run started: $(Get-Date -Format o) ===" | Out-File "$env:RUNNER_TEMP\transcript\raw.txt"
          "Trigger note: ${{ github.event.inputs.note }}" | Out-File "$env:RUNNER_TEMP\transcript\raw.txt" -Append

      # ---- Checkout all four repos into the EXACT path the hardcoded
      # CMake references expect. This avoids having to find/replace paths
      # inside Blender-android_arm64's build files at all.
      - name: Checkout APP-android_arm64
        uses: actions/checkout@v4
        with:
          path: FreeProjects/Blender/Blender/APP-android_arm64
          persist-credentials: true

      - name: Checkout Blender-android_arm64 (blender-v3.6-release)
        uses: actions/checkout@v4
        with:
          repository: wolferd-wolf/Blender-android_arm64
          ref: blender-v3.6-release
          path: FreeProjects/Blender/Blender/Blender-android_arm64

      - name: Checkout lib-android_arm64
        uses: actions/checkout@v4
        with:
          repository: wolferd-wolf/lib-android_arm64
          path: FreeProjects/Blender/Blender/lib-android_arm64

      - name: Checkout Utilities-android_arm64
        uses: actions/checkout@v4
        with:
          repository: wolferd-wolf/Utilities-android_arm64
          path: FreeProjects/Blender/Blender/Utilities-android_arm64

      # Windows runners use C: by default for the workspace. We need this
      # tree to actually live at D:\FreeProjects\... to match the hardcoded
      # paths literally. Junction the C: checkout into D:.
      - name: Link checkout tree onto D:\
        shell: pwsh
        run: |
          Start-Transcript -Path "$env:RUNNER_TEMP\transcript\raw.txt" -Append | Out-Null
          New-Item -ItemType Directory -Force -Path "D:\FreeProjects\Blender" | Out-Null
          if (Test-Path "D:\FreeProjects\Blender\Blender") {
            Remove-Item "D:\FreeProjects\Blender\Blender" -Recurse -Force
          }
          cmd /c mklink /J "D:\FreeProjects\Blender\Blender" "$env:GITHUB_WORKSPACE\FreeProjects\Blender\Blender"
          Get-ChildItem "D:\FreeProjects\Blender\Blender"
          Stop-Transcript | Out-Null

      # ---- sdkmanager itself now requires JDK 17+, even though the actual
      # build (AGP 4.1.1) requires JDK 8. These are two different tools with
      # two different Java requirements - use JDK 17 ONLY for the package
      # install step below, then switch to JDK 8 for the build steps later.
      - name: Set up JDK 17 (required to RUN sdkmanager itself)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install pinned Android SDK/NDK/CMake
        shell: pwsh
        run: |
          $logFile = "$env:RUNNER_TEMP\transcript\raw.txt"
          $sdkManager = "$env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin\sdkmanager.bat"

          function Install-Package($pkg) {
            "---- Installing $pkg ----" | Tee-Object -FilePath $logFile -Append | Out-Null
            & $sdkManager --install $pkg 2>&1 | Tee-Object -FilePath $logFile -Append | Out-Null
            $code = $LASTEXITCODE
            "exit code: $code" | Tee-Object -FilePath $logFile -Append | Out-Null
            return $code
          }

          $failures = @()
          foreach ($pkg in @("platforms;android-30","ndk;21.4.7075529","cmake;3.10.2.4988404","cmake;3.18.1","cmake;3.22.1")) {
            $code = Install-Package $pkg
            if ($code -ne 0) {
              "RETRYING $pkg once after failure" | Tee-Object -FilePath $logFile -Append
              $code = Install-Package $pkg
            }
            if ($code -ne 0) { $failures += $pkg }
          }

          "---- Verifying installed packages ----" | Tee-Object -FilePath $logFile -Append
          $installed = & $sdkManager --list_installed 2>&1
          $installedText = $installed -join "`n"
          $installedText | Tee-Object -FilePath $logFile -Append
          foreach ($required in @("ndk;21.4.7075529","cmake;3.10.2.4988404","cmake;3.18.1","cmake;3.22.1","platforms;android-30")) {
            if ($installedText -notmatch [regex]::Escape($required)) {
              $failures += "$required (missing from --list_installed)"
            }
          }

          if ($failures.Count -gt 0) {
            "SDK_INSTALL_RESULT=FAILED: $($failures -join ', ')" | Out-File -FilePath "$env:RUNNER_TEMP\sdk_install_result.txt"
            "SDK INSTALL FAILURES: $($failures -join ', ')" | Tee-Object -FilePath $logFile -Append
          } else {
            "SDK_INSTALL_RESULT=all packages verified" | Out-File -FilePath "$env:RUNNER_TEMP\sdk_install_result.txt"
            "All pinned packages verified as actually installed." | Tee-Object -FilePath $logFile -Append
          }
          exit 0

      # ---- NOW switch to JDK 8 for the actual AGP 4.1.1 / Gradle 6.5 build
      # steps that come after this in later stages.
      - name: Set up JDK 8 (required by AGP 4.1.1, for later build steps)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      # ================= STAGE 2 =================
      # Attempt makeblender pass 1. IMPORTANT: this build is EXPECTED to
      # fail partway through - Blender's CMake build normally runs the
      # compiled makesdna tool on the host to generate dna.c, but a
      # cross-compiled ARM64 binary can't run on this Windows x64 host.
      # So gradle exiting non-zero here is not necessarily a real failure.
      # The actual thing we're checking is whether libmakesdna.a got built
      # BEFORE it hit that (expected) wall.
      - name: Checkout Utilities-android_arm64/MakeBlender is already present
        run: echo "already checked out in stage 1 steps above"
        shell: bash

      - name: Install standalone Gradle 6.5 (repo's gradle-wrapper.jar is missing)
        shell: pwsh
        run: |
          $logFile = "$env:RUNNER_TEMP\transcript\raw.txt"
          "---- Installing standalone Gradle 6.5 (wrapper jar missing from repo) ----" | Tee-Object -FilePath $logFile -Append
          Invoke-WebRequest -Uri "https://services.gradle.org/distributions/gradle-6.5-bin.zip" -OutFile "$env:RUNNER_TEMP\gradle-6.5.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\gradle-6.5.zip" -DestinationPath "$env:RUNNER_TEMP\gradle-install"
          $gradleBin = "$env:RUNNER_TEMP\gradle-install\gradle-6.5\bin"
          "Gradle installed at $gradleBin" | Tee-Object -FilePath $logFile -Append
          Get-ChildItem $gradleBin | Tee-Object -FilePath $logFile -Append
          echo "$gradleBin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Fix missing pnglibconf.h (libpng needs its prebuilt fallback copied in)
        shell: pwsh
        run: |
          $pngDir = "D:\FreeProjects\Blender\Blender\lib-android_arm64\Png\include\libpng-1.6.40"
          Copy-Item "$pngDir\scripts\pnglibconf.h.prebuilt" "$pngDir\pnglibconf.h"
          Write-Host "Copied pnglibconf.h.prebuilt -> pnglibconf.h"

      - name: Restrict CMake build to exactly what MakeSDNA + MakeSRNA need (avoid Cycles-app/RNA-header-consuming code), and add x86_64 ABI for CI emulator use
        shell: pwsh
        run: |
          $gradlePath = "$env:GITHUB_WORKSPACE\FreeProjects\Blender\Blender\Utilities-android_arm64\MakeBlender\app\build.gradle"
          $lines = Get-Content $gradlePath
          $out = New-Object System.Collections.Generic.List[string]
          # Full list of static libs MakeSRNA's own CMakeLists.txt links
          # against (found by reading it directly) - makesrna.c's generation
          # logic pulls in real references across most of Blender, unlike
          # makesdna which only needed bf_dna/bf_dna_blenlib. makesdna is
          # included here too since MakeSDNA still needs it.
          $targets = @(
            "makesdna","makesrna","bf_dna","bf_dna_blenlib",
            "bf_intern_ghost","bf_gpu","bf_blenfont","bf_blenlib",
            "bf_nodes_function","bf_functions","bf_python_gpu",
            "bf_intern_mantaflow","bf_python_ext","bf_avi","bf_ikplugin",
            "bf_imbuf_openexr","bf_editor_space_userpref",
            "bf_imbuf_openimageio","bf_intern_opencolorio",
            "bf_editor_lattice","bf_editor_mask","bf_imbuf_cineon",
            "bf_intern_memutil","bf_editor_space_script","bf_editor_metaball",
            "bf_compositor_shaders","bf_gpu_shaders","bf_draw_shaders",
            "bf_editor_datafiles","bf_intern_opensubdiv","bf_ocio_shaders",
            "extern_mantaflow","bf_intern_quadriflow","extern_quadriflow",
            "bf_intern_libmv","bf_intern_audaspace","audaspace-py",
            "extern_ceres","audaspace","extern_glog","extern_gflags",
            "cycles_bvh","cycles_scene","cycles_integrator","cycles_session",
            "cycles_device","bf_intern_rigidbody","extern_lzma",
            "extern_bullet","extern_clew","extern_minilzo",
            "bf_intern_iksolver","bf_intern_itasc","bf_intern_eigen",
            "bf_intern_dualcon","bf_intern_openvdb","bf_intern_locale",
            "bf_intern_sky","cycles_kernel","cycles_graph","cycles_util",
            "extern_curve_fit_nd","extern_rangetree","extern_wcwidth",
            "cycles_subd","bf_intern_libc_compat","bf_intern_clog",
            "bf_intern_guardedalloc"
          )
          $targetsLine = '                targets ' + (($targets | ForEach-Object { '"' + $_ + '"' }) -join ", ")
          foreach ($line in $lines) {
            if ($line -match 'abiFilters\s*"arm64-v8a"') {
              $out.Add('                abiFilters "arm64-v8a", "x86_64"')
            } else {
              $out.Add($line)
            }
            if ($line -match 'cppFlags\s*""') {
              $out.Add($targetsLine)
            }
          }
          $out | Set-Content $gradlePath
          Write-Host "---- patched build.gradle ----"
          Get-Content $gradlePath | Select-String "targets|cppFlags|abiFilters"

      - name: Attempt makeblender pass 1+2 combined (makesdna + everything makesrna needs; expected to fail before reaching full-app RNA-consuming code)
        shell: pwsh
        run: |
          $logFile = "$env:RUNNER_TEMP\transcript\raw.txt"
          $buildLogFile = "$env:RUNNER_TEMP\transcript\makeblender_build.txt"
          "---- makeblender pass 1+2 starting: $(Get-Date -Format o) ----" | Out-File $logFile -Append
          "---- disk space before build ----" | Out-File $logFile -Append
          Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize | Out-String | Out-File $logFile -Append
          Push-Location "$env:GITHUB_WORKSPACE\FreeProjects\Blender\Blender\Utilities-android_arm64\MakeBlender"
          # This build is MUCH bigger than the makesdna-only one (~70 libs
          # including Cycles kernel). Redirect gradle's output using cmd's
          # own > redirection directly to a dedicated file, rather than
          # piping through PowerShell's Tee-Object - that pipeline buffers
          # output as PowerShell objects, which may not hold up under a
          # much larger volume than the previous makesdna-only build had.
          cmd /c "gradle.bat externalNativeBuildRelease --stacktrace > `"$buildLogFile`" 2>&1"
          $exitCode = $LASTEXITCODE
          Pop-Location
          "---- disk space after build ----" | Out-File $logFile -Append
          Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize | Out-String | Out-File $logFile -Append
          "gradle exit code: $exitCode (non-zero here can be EXPECTED - see note above)" | Out-File $logFile -Append
          if (Test-Path $buildLogFile) {
            $lineCount = (Get-Content $buildLogFile | Measure-Object -Line).Lines
            "build log captured: $lineCount lines at $buildLogFile" | Out-File $logFile -Append
            "---- last 200 lines of build output ----" | Out-File $logFile -Append
            Get-Content $buildLogFile -Tail 200 | Out-File $logFile -Append
          } else {
            "NO build log file was created at all - cmd redirection itself may have failed" | Out-File $logFile -Append
          }
          exit 0

      - name: Check whether libmakesdna.a AND libmakesrna.a (+ spot-check heavy libs) actually got produced
        if: always()
        shell: pwsh
        run: |
          $logFile = "$env:RUNNER_TEMP\transcript\raw.txt"
          $buildRoot = "$env:GITHUB_WORKSPACE\FreeProjects\Blender\Blender\Utilities-android_arm64\MakeBlender"
          $required = @("libmakesdna.a","libmakesrna.a","libcycles_kernel.a","libbf_blenlib.a","libbf_intern_openvdb.a")
          $missing = @()
          foreach ($lib in $required) {
            $found = Get-ChildItem -Path $buildRoot -Recurse -Filter $lib -ErrorAction SilentlyContinue
            if ($found) {
              "FOUND $lib at: $($found[0].FullName)" | Tee-Object -FilePath $logFile -Append
            } else {
              "MISSING: $lib" | Tee-Object -FilePath $logFile -Append
              $missing += $lib
            }
          }
          if ($missing.Count -eq 0) {
            "STAGE2_RESULT=found (all required libs present)" | Out-File -FilePath "$env:RUNNER_TEMP\stage2_result.txt"
          } else {
            "STAGE2_RESULT=not_found (missing: $($missing -join ', '))" | Out-File -FilePath "$env:RUNNER_TEMP\stage2_result.txt"
            "Listing what DOES exist under app/.cxx (first 150 entries):" | Tee-Object -FilePath $logFile -Append
            Get-ChildItem -Path "$buildRoot\app\.cxx" -Recurse -ErrorAction SilentlyContinue |
              Select-Object -First 150 -ExpandProperty FullName | Tee-Object -FilePath $logFile -Append
          }
          exit 0

      # ================= STAGE 3 (part 1) =================
      # Build the MakeSDNA app itself. It links directly against the
      # libmakesdna.a we just built (hardcoded path in its CMakeLists.txt),
      # so this must run after the step above, in the same job/runner.
      # Building the DEBUG variant specifically - AGP makes debug builds
      # debuggable=true automatically, which lets us pull files out of its
      # private /data/data/ directory via `adb shell run-as` without root.
      - name: Patch MakeSDNA for multi-ABI build (add x86_64, fix hardcoded arm64-v8a path in its CMakeLists.txt)
        if: always()
        shell: pwsh
        run: |
          $logFile = "$env:RUNNER_TEMP\transcript\raw.txt"
          $sdnaRoot = "$env:GITHUB_WORKSPACE\FreeProjects\Blender\Blender\Utilities-android_arm64\MakeSDNA"

          # 1) add x86_64 ABI alongside the real arm64-v8a target
          $gradlePath = "$sdnaRoot\app\build.gradle"
          $lines = Get-Content $gradlePath
          $out = New-Object System.Collections.Generic.List[string]
          foreach ($line in $lines) {
            if ($line -match 'abiFilters\s*"arm64-v8a"') {
              $out.Add('                abiFilters "arm64-v8a", "x86_64"')
            } else {
              $out.Add($line)
            }
          }
          $out | Set-Content $gradlePath

          # 2) MakeSDNA's CMakeLists.txt hardcodes the arm64-v8a path to
          # libmakesdna.a - replace with ${ANDROID_ABI} so each ABI variant
          # links against its own matching build of the library.
          $cmakePath = "$sdnaRoot\app\src\main\cpp\CMakeLists.txt"
          (Get-Content $cmakePath -Raw) -replace 'release/arm64-v8a/lib', 'release/${ANDROID_ABI}/lib' | Set-Content $cmakePath

          "---- patched MakeSDNA build.gradle + CMakeLists.txt ----" | Tee-Object -FilePath $logFile -Append
          Get-Content $gradlePath | Select-String "abiFilters" | Tee-Object -FilePath $logFile -Append
          Get-Content $cmakePath | Select-String "blenderLibLibDir" | Tee-Object -FilePath $logFile -Append

      - name: Build MakeSDNA app (debug variant)
        if: always()
        shell: pwsh
        run: |
          $logFile = "$env:RUNNER_TEMP\transcript\raw.txt"
          Push-Location "$env:GITHUB_WORKSPACE\FreeProjects\Blender\Blender\Utilities-android_arm64\MakeSDNA"
          "---- Building MakeSDNA debug APK ----" | Tee-Object -FilePath $logFile -Append
          & gradle.bat assembleDebug --stacktrace 2>&1 | Tee-Object -FilePath $logFile -Append
          "MakeSDNA gradle exit code: $LASTEXITCODE" | Tee-Object -FilePath $logFile -Append
          Pop-Location
          $apk = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\FreeProjects\Blender\Blender\Utilities-android_arm64\MakeSDNA" -Recurse -Filter "*.apk" -ErrorAction SilentlyContinue
          if ($apk) {
            "FOUND APK(s):" | Tee-Object -FilePath $logFile -Append
            $apk | ForEach-Object { "  $($_.FullName)" | Tee-Object -FilePath $logFile -Append }
            Copy-Item $apk[0].FullName "$env:GITHUB_WORKSPACE\makesdna-debug.apk"
          } else {
            "NO APK FOUND - build likely failed, check transcript above" | Tee-Object -FilePath $logFile -Append
          }
          exit 0

      - name: Upload MakeSDNA APK for the emulator job
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: makesdna-debug-apk
          path: makesdna-debug.apk
          if-no-files-found: warn

      # ================= STAGE 3 (part 1b) - same pattern, MakeSRNA =================
      - name: Patch MakeSRNA for multi-ABI build (add x86_64, fix hardcoded arm64-v8a path in its CMakeLists.txt)
        if: always()
        shell: pwsh
        run: |
          $logFile = "$env:RUNNER_TEMP\transcript\raw.txt"
          $srnaRoot = "$env:GITHUB_WORKSPACE\FreeProjects\Blender\Blender\Utilities-android_arm64\MakeSRNA"

          $gradlePath = "$srnaRoot\app\build.gradle"
          $lines = Get-Content $gradlePath
          $out = New-Object System.Collections.Generic.List[string]
          foreach ($line in $lines) {
            if ($line -match 'abiFilters\s*"arm64-v8a"') {
              $out.Add('                abiFilters "arm64-v8a", "x86_64"')
            } else {
              $out.Add($line)
            }
          }
          $out | Set-Content $gradlePath

          $cmakePath = "$srnaRoot\app\src\main\cpp\CMakeLists.txt"
          (Get-Content $cmakePath -Raw) -replace 'release/arm64-v8a/lib', 'release/${ANDROID_ABI}/lib' | Set-Content $cmakePath

          "---- patched MakeSRNA build.gradle + CMakeLists.txt ----" | Tee-Object -FilePath $logFile -Append
          Get-Content $gradlePath | Select-String "abiFilters" | Tee-Object -FilePath $logFile -Append
          Get-Content $cmakePath | Select-String "blenderLibLibDir" | Tee-Object -FilePath $logFile -Append

      - name: Build MakeSRNA app (debug variant)
        if: always()
        shell: pwsh
        run: |
          $logFile = "$env:RUNNER_TEMP\transcript\raw.txt"
          Push-Location "$env:GITHUB_WORKSPACE\FreeProjects\Blender\Blender\Utilities-android_arm64\MakeSRNA"
          "---- Building MakeSRNA debug APK ----" | Tee-Object -FilePath $logFile -Append
          & gradle.bat assembleDebug --stacktrace 2>&1 | Tee-Object -FilePath $logFile -Append
          "MakeSRNA gradle exit code: $LASTEXITCODE" | Tee-Object -FilePath $logFile -Append
          Pop-Location
          $apk = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\FreeProjects\Blender\Blender\Utilities-android_arm64\MakeSRNA" -Recurse -Filter "*.apk" -ErrorAction SilentlyContinue
          if ($apk) {
            "FOUND APK(s):" | Tee-Object -FilePath $logFile -Append
            $apk | ForEach-Object { "  $($_.FullName)" | Tee-Object -FilePath $logFile -Append }
            Copy-Item $apk[0].FullName "$env:GITHUB_WORKSPACE\makesrna-debug.apk"
          } else {
            "NO APK FOUND - build likely failed, check transcript above" | Tee-Object -FilePath $logFile -Append
          }
          exit 0

      - name: Upload MakeSRNA APK for the emulator job
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: makesrna-debug-apk
          path: makesrna-debug.apk
          if-no-files-found: warn
      # raw transcript alongside it, then commit both straight back into
      # the repo. This is the part that matters: Claude cannot fetch
      # GitHub's Actions log/artifact storage from its sandbox (those
      # domains aren't reachable), but it CAN read a normal git commit.
      # So the job reports on itself, in the repo, rather than relying on
      # Claude polling the Actions API for logs.
      - name: Write report and full transcript into automation-reports/
        if: always()
        shell: pwsh
        run: |
          $reportDir = "$env:GITHUB_WORKSPACE\FreeProjects\Blender\Blender\APP-android_arm64\automation-reports"
          New-Item -ItemType Directory -Force -Path $reportDir | Out-Null
          $stamp = Get-Date -Format "yyyy-MM-dd_HHmmss"
          $status = "${{ job.status }}"

          $transcriptSrc = "$env:RUNNER_TEMP\transcript\raw.txt"
          $transcriptDest = "$reportDir\$stamp-stage1-raw-transcript.txt"
          if (Test-Path $transcriptSrc) {
            Copy-Item $transcriptSrc $transcriptDest
            "transcript file size: $((Get-Item $transcriptSrc).Length) bytes" | Out-File "$reportDir\$stamp-transcript-meta.txt"
          } else {
            "transcript file was not found at $transcriptSrc" | Out-File $transcriptDest
          }

          $buildLogSrc = "$env:RUNNER_TEMP\transcript\makeblender_build.txt"
          if (Test-Path $buildLogSrc) {
            Copy-Item $buildLogSrc "$reportDir\$stamp-stage1-makeblender-full-build.txt"
          }

          $sdkResult = "unknown (sdk_install_result.txt not found)"
          if (Test-Path "$env:RUNNER_TEMP\sdk_install_result.txt") {
            $sdkResult = Get-Content "$env:RUNNER_TEMP\sdk_install_result.txt" -Raw
          }
          $stage2Result = "unknown (stage2_result.txt not found)"
          if (Test-Path "$env:RUNNER_TEMP\stage2_result.txt") {
            $stage2Result = Get-Content "$env:RUNNER_TEMP\stage2_result.txt" -Raw
          }

          $reportFile = "$reportDir\$stamp-stage1-setup.md"
          @"
          # Stage 1+2 report - $stamp

          Trigger note: ${{ github.event.inputs.note }}
          Job status: $status
          Runner: windows-latest
          Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Full raw transcript: $stamp-stage1-raw-transcript.txt (committed alongside this file)

          ## SDK/NDK/CMake install result
          $sdkResult

          ## Stage 2 result (the actual question this run answers)
          $stage2Result

          ## Steps executed
          - Checked out APP-android_arm64, Blender-android_arm64 (blender-v3.6-release),
            lib-android_arm64, Utilities-android_arm64
          - Linked checkout tree to D:\FreeProjects\Blender\Blender
          - Installed JDK 17, used it to install Android platform 30, NDK 21.4.7075529,
            CMake 3.10.2.4988404 / 3.18.1 / 3.22.1 via sdkmanager, then verified each
            package actually appears in --list_installed (not just that the command exited 0)
          - Switched to JDK 8 for later build steps
          - Attempted makeblender pass 1 via gradlew externalNativeBuildRelease
            (gradle's own exit code is NOT the success signal here - see Stage 2 result above)
          - Searched the MakeBlender build tree for libmakesdna.a

          ## Not attempted in this run
          - MakeSDNA / MakeSRNA compile, install, or on-device execution
          - Any Blender version bump
          - makeblender pass 2 or 3

          ## Notes / next step
          If libmakesdna.a was found, next step is building the MakeSDNA app
          and figuring out how to run it non-interactively via adb on an
          emulator. If not found, read the raw transcript for the actual
          gradle/CMake error - probably a real, new problem, not the
          expected "can't run cross-compiled makesdna" wall.
          "@ | Out-File -FilePath $reportFile -Encoding utf8

          Write-Host "Report written to $reportFile"
          Write-Host "Transcript copied to $transcriptDest"

      - name: Commit report back to the repo
        if: always()
        working-directory: FreeProjects/Blender/Blender/APP-android_arm64
        shell: bash
        run: |
          git config user.name "stage1-ci-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f automation-reports/
          if git diff --cached --quiet; then
            echo "Nothing new to commit"
          else
            git commit -m "Stage 1 run report (status: ${{ job.status }}, run ${{ github.run_id }})"
            git push
          fi

      - name: Also upload as artifact (backup, may not be fetchable by Claude)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage1-report
          path: FreeProjects/Blender/Blender/APP-android_arm64/automation-reports/*

  # ================= STAGE 3 (part 2) =================
  # This job runs on Linux specifically because GitHub's hosted Linux
  # runners have hardware-accelerated (KVM) Android emulator support, which
  # windows-latest does not reliably have. It only needs the APK built by
  # the "setup" job above - not the full repo checkout or D: path trick.
  run-makesdna-on-device:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout APP-android_arm64 (for committing results)
        uses: actions/checkout@v4

      - name: Checkout Blender-android_arm64 (only need the DNA_*.h headers as input for makesdna)
        uses: actions/checkout@v4
        with:
          repository: wolferd-wolf/Blender-android_arm64
          ref: blender-v3.6-release
          path: blender-src

      - name: Download MakeSDNA APK from setup job
        uses: actions/download-artifact@v4
        with:
          name: makesdna-debug-apk

      - name: Download MakeSRNA APK from setup job
        uses: actions/download-artifact@v4
        with:
          name: makesrna-debug-apk

      - name: Install Android SDK components (emulator, platform-tools, system image)
        run: |
          {
            export ANDROID_HOME="$HOME/android-sdk"
            mkdir -p "$ANDROID_HOME/cmdline-tools"
            cd /tmp
            curl -sS -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
            unzip -q cmdline-tools.zip -d "$ANDROID_HOME/cmdline-tools"
            mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
            SDKM="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
            yes | $SDKM --licenses > /dev/null 2>&1 || true
            $SDKM --install "platform-tools" "emulator" "platforms;android-30" "system-images;android-30;google_apis;x86_64"
            echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
            echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"
            echo "ANDROID_AVD_HOME=$HOME/.android/avd" >> "$GITHUB_ENV"
            mkdir -p "$HOME/.android/avd"
            echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
            echo "$ANDROID_HOME/emulator" >> "$GITHUB_PATH"
            echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          } | tee /tmp/sdk_install.log

      - name: Ensure KVM is accessible (composite action used to handle this internally)
        run: |
          {
            ls -la /dev/kvm
            sudo chmod 666 /dev/kvm || echo "chmod failed"
            ls -la /dev/kvm
          } | tee /tmp/kvm_setup.log

      - name: Create AVD
        run: |
          {
            echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT ANDROID_AVD_HOME=$ANDROID_AVD_HOME"
            echo "no" | avdmanager create avd -n test_avd -k "system-images;android-30;google_apis;x86_64" -d pixel_5 --force
            echo "---- verifying AVD actually exists now ----"
            emulator -list-avds
            ls -la "$ANDROID_AVD_HOME"
          } | tee -a /tmp/sdk_install.log

      - name: Boot emulator manually with full output capture (not using the composite action - its internal logs aren't readable by Claude)
        run: |
          mkdir -p /tmp/dna_output
          # Launch directly, redirecting ALL output (this is the part that
          # was invisible before) to a file on disk that I control and can
          # read after the fact via the repo commit.
          nohup emulator -avd test_avd -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -camera-back none -no-snapshot > /tmp/dna_output/emulator_boot.log 2>&1 &
          echo "emulator launched with PID $!"
          echo "---- waiting for device to appear (adb wait-for-device) ----"
          timeout 120 adb wait-for-device
          echo "adb wait-for-device exit code: $?"
          echo "---- polling for full boot completion (sys.boot_completed) ----"
          for i in $(seq 1 60); do
            booted=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r\n')
            echo "  poll $i: sys.boot_completed=[$booted]"
            if [ "$booted" = "1" ]; then
              echo "Boot completed after ~$((i*5)) seconds"
              break
            fi
            sleep 5
          done
          adb devices
        continue-on-error: true

      - name: Run MakeSDNA on the emulator and pull generated DNA files
        id: run_emulator
        continue-on-error: true
        run: |
          mkdir -p /tmp/dna_output
          exec > >(tee -a /tmp/dna_output/emulator_transcript.log) 2>&1
          echo "=== emulator script starting: $(date -u -Iseconds) ==="
          adb devices
          timeout 60 adb install -r makesdna-debug.apk
          echo "install exit code: $?"
          # IMPORTANT: makesdna's main() reads its INPUT (the DNA_*.h type
          # headers) from a base_directory passed as an argv, hardcoded in
          # native-lib.cpp to /data/data/com.epai.makesdna/makesdna/. That
          # folder needs to actually contain those headers before we launch
          # the app, or generation silently fails on missing input files.
          # This needs root (adb root) since the app hasn't run yet and the
          # directory doesn't exist as the app's own writable area yet.
          timeout 30 adb root
          echo "adb root exit code: $?"
          sleep 2
          timeout 30 adb shell mkdir -p /data/data/com.epai.makesdna/makesdna
          timeout 60 adb push blender-src/source/blender/makesdna/. /data/data/com.epai.makesdna/makesdna/
          echo "adb push exit code: $?"
          echo "---- pushed input headers, verifying ----"
          adb shell ls /data/data/com.epai.makesdna/makesdna | head -5
          echo "---- installed, launching MainActivity ----"
          timeout 30 adb shell am start -n com.epai.makesdna/.MainActivity
          echo "am start exit code: $?"
          echo "---- waiting for native code to run ----"
          sleep 10
          echo "---- checking logcat for crashes ----"
          adb logcat -d -t 300 | grep -i "epai\|makesdna\|AndroidRuntime\|FATAL" || echo "(nothing matched in logcat)"
          echo "---- pulling generated files directly as root (run-as refuses world-writable dirs, which chmod 777 created - so skip run-as entirely since we're already root) ----"
          adb exec-out cat /data/data/com.epai.makesdna/dna.c > /tmp/dna_output/dna.c || echo "PULL_FAILED: dna.c"
          adb exec-out cat /data/data/com.epai.makesdna/dna_type_offsets.h > /tmp/dna_output/dna_type_offsets.h || echo "PULL_FAILED: dna_type_offsets.h"
          adb exec-out cat /data/data/com.epai.makesdna/dna_verify.c > /tmp/dna_output/dna_verify.c || echo "PULL_FAILED: dna_verify.c"
          echo "---- results ----"
          ls -la /tmp/dna_output/
          for f in dna.c dna_type_offsets.h dna_verify.c; do
            echo "=== $f (first 20 lines) ==="
            head -20 "/tmp/dna_output/$f" 2>/dev/null || echo "(missing or empty)"
          done

      - name: Run MakeSRNA on the emulator and pull generated RNA files
        id: run_srna_emulator
        continue-on-error: true
        run: |
          mkdir -p /tmp/dna_output/rna_output
          exec > >(tee -a /tmp/dna_output/emulator_transcript.log) 2>&1
          echo "=== MakeSRNA starting: $(date -u -Iseconds) ==="
          adb devices
          timeout 60 adb install -r makesrna-debug.apk
          echo "install exit code: $?"
          # Unlike makesdna, makesrna's main()/rna_preprocess() only takes
          # OUTPUT directory args - no input headers need pushing, since all
          # of RNA's actual definition source is compiled directly into the
          # static lib at build time on the Windows runner, not read at
          # runtime. So: just launch and pull.
          timeout 30 adb shell am start -n com.epai.makesrna/.MainActivity
          echo "am start exit code: $?"
          echo "---- waiting for native code to run (this does a LOT more work than makesdna did) ----"
          sleep 20
          echo "---- checking logcat for crashes ----"
          adb logcat -d -t 300 | grep -i "epai\|makesrna\|AndroidRuntime\|FATAL" || echo "(nothing matched in logcat)"
          echo "---- pulling entire output directory (many files expected, exact names unknown ahead of time) ----"
          adb pull /data/data/com.epai.makesrna/ /tmp/dna_output/rna_output/ || echo "PULL_FAILED: whole directory pull"
          echo "---- results ----"
          find /tmp/dna_output/rna_output -type f | wc -l
          find /tmp/dna_output/rna_output -type f | head -30
          echo "---- specifically checking for RNA_blender_cpp.h (the file that blocked the full blender build earlier) ----"
          find /tmp/dna_output/rna_output -iname "RNA_blender_cpp.h" -exec echo "FOUND: {}" \; -exec wc -l {} \;

      - name: Diagnose emulator boot (runs regardless - the emulator seems to be failing before my script even starts)
        if: always()
        run: |
          {
            echo "=== KVM availability ==="
            ls -la /dev/kvm 2>&1 || echo "/dev/kvm does not exist"
            egrep -c '(vmx|svm)' /proc/cpuinfo || echo "no virtualization CPU flags found"
            echo "=== disk space ==="
            df -h
            echo "=== memory ==="
            free -h
            echo "=== full .android directory tree (unfiltered) ==="
            find ~/.android -maxdepth 6 2>&1 | head -100
            find /home/runner/.android -maxdepth 6 2>&1 | head -100
            echo "=== ALL log files anywhere under home, no time filter ==="
            find /home/runner -iname "*.log" 2>/dev/null | head -40
            echo "=== ANDROID_SDK_ROOT / ANDROID_HOME env ==="
            echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT ANDROID_HOME=$ANDROID_HOME"
            find "$ANDROID_SDK_ROOT" -maxdepth 2 2>&1 | head -30
            echo "=== any emulator or qemu process, running or zombie ==="
            ps aux | grep -i "emulator\|qemu" | grep -v grep
            echo "=== dmesg tail (kvm/oom related) ==="
            dmesg 2>&1 | tail -60
          } | tee /tmp/emulator_diagnosis.log
        continue-on-error: true

      - name: Write stage 3 report and commit generated files
        if: always()
        run: |
          mkdir -p automation-reports generated-dna
          stamp=$(date -u +"%Y-%m-%d_%H%M%S")
          if [ -f /tmp/sdk_install.log ]; then
            cp /tmp/sdk_install.log "automation-reports/${stamp}-stage3-sdk-install.txt"
          fi
          if [ -f /tmp/kvm_setup.log ]; then
            cp /tmp/kvm_setup.log "automation-reports/${stamp}-stage3-kvm-setup.txt"
          fi
          if [ -f /tmp/dna_output/emulator_boot.log ]; then
            cp /tmp/dna_output/emulator_boot.log "automation-reports/${stamp}-stage3-emulator-boot.txt"
          fi
          if [ -f /tmp/dna_output/emulator_transcript.log ]; then
            cp /tmp/dna_output/emulator_transcript.log "automation-reports/${stamp}-stage3-emulator-transcript.txt"
          fi
          if [ -f /tmp/emulator_diagnosis.log ]; then
            cp /tmp/emulator_diagnosis.log "automation-reports/${stamp}-stage3-emulator-diagnosis.txt"
          fi
          : > /tmp/stage3_summary.txt
          for f in dna.c dna_type_offsets.h dna_verify.c; do
            if [ -s "/tmp/dna_output/$f" ]; then
              cp "/tmp/dna_output/$f" "generated-dna/$f"
              echo "$f: present, $(wc -l < /tmp/dna_output/$f) lines" >> /tmp/stage3_summary.txt
            else
              echo "$f: MISSING or empty" >> /tmp/stage3_summary.txt
            fi
          done

          : > /tmp/stage3_rna_summary.txt
          mkdir -p generated-rna
          if [ -d /tmp/dna_output/rna_output ]; then
            rna_file_count=$(find /tmp/dna_output/rna_output -type f | wc -l)
            echo "RNA output files pulled: $rna_file_count" >> /tmp/stage3_rna_summary.txt
            find /tmp/dna_output/rna_output -type f | head -50 >> /tmp/stage3_rna_summary.txt
            if [ "$rna_file_count" -gt 0 ]; then
              cp -r /tmp/dna_output/rna_output/. generated-rna/
            fi
            rna_cpp=$(find /tmp/dna_output/rna_output -iname "RNA_blender_cpp.h" | head -1)
            if [ -n "$rna_cpp" ]; then
              echo "RNA_blender_cpp.h: FOUND at $rna_cpp ($(wc -l < "$rna_cpp") lines)" >> /tmp/stage3_rna_summary.txt
            else
              echo "RNA_blender_cpp.h: NOT FOUND" >> /tmp/stage3_rna_summary.txt
            fi
          else
            echo "rna_output directory does not exist - pull likely failed entirely" >> /tmp/stage3_rna_summary.txt
          fi
          {
            echo "# Stage 3 report - $stamp"
            echo ""
            echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "MakeSDNA emulator step conclusion: ${{ steps.run_emulator.outcome }}"
            echo "MakeSRNA emulator step conclusion: ${{ steps.run_srna_emulator.outcome }}"
            echo ""
            echo "## On-device DNA generation result"
            cat /tmp/stage3_summary.txt
            echo ""
            echo "## On-device RNA generation result"
            cat /tmp/stage3_rna_summary.txt
            echo ""
            echo "## /tmp/dna_output directory listing"
            ls -la /tmp/dna_output/ 2>&1 || echo "directory does not exist"
          } > "automation-reports/${stamp}-stage3-makesdna-device.md"
          echo "---- report file written, contents: ----"
          cat "automation-reports/${stamp}-stage3-makesdna-device.md"

          git config user.name "stage1-ci-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f automation-reports/ generated-dna/ generated-rna/
          git status
          if git diff --cached --quiet; then
            echo "Nothing new to commit"
          else
            git commit -m "Stage 3: on-device MakeSDNA run (run ${{ github.run_id }})"
            # job1 (setup) already pushed its own commit to main while this
            # job was running. actions/checkout pins to the trigger commit,
            # not the live branch head, so this job's base is now stale -
            # rebase onto whatever job1 pushed before trying to push.
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
            echo "git push exit code: $?"
          fi
