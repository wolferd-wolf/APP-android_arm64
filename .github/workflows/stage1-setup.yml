name: Stage 1 - Repo layout + toolchain setup (no compile yet)

# Manual trigger only. This is exploratory - we are not ready to run this
# automatically on every push. Run it by hand from the Actions tab.
on:
  workflow_dispatch:
    inputs:
      note:
        description: "Why are you running this (for the report log)"
        required: false
        default: "manual test run"

permissions:
  contents: write

jobs:
  setup:
    runs-on: windows-latest
    steps:
      # ---- Shared transcript file. IMPORTANT: each Actions step runs in a
      # brand new process, so Start-Transcript in one step does NOT persist
      # into later steps - it only survives within a single step's own
      # process. So instead of one Start/Stop spanning the whole job, each
      # step below that matters opens its own Start-Transcript(-Append) /
      # Stop-Transcript pair, all pointed at the same shared file. The file
      # itself does persist across steps (it's just a file on disk); only
      # the transcript *session state* doesn't.
      - name: Init transcript file
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\transcript" | Out-Null
          "=== Stage 1 run started: $(Get-Date -Format o) ===" | Out-File "$env:RUNNER_TEMP\transcript\raw.txt"
          "Trigger note: ${{ github.event.inputs.note }}" | Out-File "$env:RUNNER_TEMP\transcript\raw.txt" -Append

      # ---- Checkout all four repos into the EXACT path the hardcoded
      # CMake references expect. This avoids having to find/replace paths
      # inside Blender-android_arm64's build files at all.
      - name: Checkout APP-android_arm64
        uses: actions/checkout@v4
        with:
          path: FreeProjects/Blender/Blender/APP-android_arm64
          persist-credentials: true

      - name: Checkout Blender-android_arm64 (blender-v3.6-release)
        uses: actions/checkout@v4
        with:
          repository: wolferd-wolf/Blender-android_arm64
          ref: blender-v3.6-release
          path: FreeProjects/Blender/Blender/Blender-android_arm64

      - name: Checkout lib-android_arm64
        uses: actions/checkout@v4
        with:
          repository: wolferd-wolf/lib-android_arm64
          path: FreeProjects/Blender/Blender/lib-android_arm64

      - name: Checkout Utilities-android_arm64
        uses: actions/checkout@v4
        with:
          repository: wolferd-wolf/Utilities-android_arm64
          path: FreeProjects/Blender/Blender/Utilities-android_arm64

      # Windows runners use C: by default for the workspace. We need this
      # tree to actually live at D:\FreeProjects\... to match the hardcoded
      # paths literally. Junction the C: checkout into D:.
      - name: Link checkout tree onto D:\
        shell: pwsh
        run: |
          Start-Transcript -Path "$env:RUNNER_TEMP\transcript\raw.txt" -Append | Out-Null
          New-Item -ItemType Directory -Force -Path "D:\FreeProjects\Blender" | Out-Null
          if (Test-Path "D:\FreeProjects\Blender\Blender") {
            Remove-Item "D:\FreeProjects\Blender\Blender" -Recurse -Force
          }
          cmd /c mklink /J "D:\FreeProjects\Blender\Blender" "$env:GITHUB_WORKSPACE\FreeProjects\Blender\Blender"
          Get-ChildItem "D:\FreeProjects\Blender\Blender"
          Stop-Transcript | Out-Null

      # ---- sdkmanager itself now requires JDK 17+, even though the actual
      # build (AGP 4.1.1) requires JDK 8. These are two different tools with
      # two different Java requirements - use JDK 17 ONLY for the package
      # install step below, then switch to JDK 8 for the build steps later.
      - name: Set up JDK 17 (required to RUN sdkmanager itself)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install pinned Android SDK/NDK/CMake
        shell: pwsh
        run: |
          Start-Transcript -Path "$env:RUNNER_TEMP\transcript\raw.txt" -Append | Out-Null
          try {
            $sdkManager = "$env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin\sdkmanager.bat"
            $ErrorActionPreference = "Stop"

            function Install-Package($pkg) {
              Write-Host "---- Installing $pkg ----"
              & $sdkManager --install $pkg
              Write-Host "exit code: $LASTEXITCODE"
              if ($LASTEXITCODE -ne 0) {
                throw "sdkmanager failed to install $pkg (exit code $LASTEXITCODE)"
              }
            }

            Install-Package "platforms;android-30"
            Install-Package "ndk;21.4.7075529"
            Install-Package "cmake;3.10.2.4988404"
            Install-Package "cmake;3.18.1"
            Install-Package "cmake;3.22.1"

            Write-Host "---- Verifying installed packages ----"
            $installed = & $sdkManager --list_installed
            Write-Host $installed
            # IMPORTANT: $installed is an array of lines. -notmatch on an
            # array filters elements and returns a (non-empty) array, which
            # is always truthy in an `if` - that caused every check to
            # false-positive fail regardless of what was actually installed.
            # Join to one string first so -notmatch returns an actual boolean.
            $installedText = $installed -join "`n"
            foreach ($required in @("ndk;21.4.7075529","cmake;3.10.2.4988404","cmake;3.18.1","cmake;3.22.1","platforms;android-30")) {
              if ($installedText -notmatch [regex]::Escape($required)) {
                throw "VERIFICATION FAILED: $required does not appear in --list_installed output"
              }
            }
            Write-Host "All pinned packages verified as actually installed."
          } finally {
            Stop-Transcript | Out-Null
          }

      # ---- NOW switch to JDK 8 for the actual AGP 4.1.1 / Gradle 6.5 build
      # steps that come after this in later stages.
      - name: Set up JDK 8 (required by AGP 4.1.1, for later build steps)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      # ================= STAGE 2 =================
      # Attempt makeblender pass 1. IMPORTANT: this build is EXPECTED to
      # fail partway through - Blender's CMake build normally runs the
      # compiled makesdna tool on the host to generate dna.c, but a
      # cross-compiled ARM64 binary can't run on this Windows x64 host.
      # So gradle exiting non-zero here is not necessarily a real failure.
      # The actual thing we're checking is whether libmakesdna.a got built
      # BEFORE it hit that (expected) wall.
      - name: Checkout Utilities-android_arm64/MakeBlender is already present
        run: echo "already checked out in stage 1 steps above"
        shell: bash

      - name: Attempt makeblender pass 1 (expected to fail after libmakesdna.a)
        shell: pwsh
        run: |
          Start-Transcript -Path "$env:RUNNER_TEMP\transcript\raw.txt" -Append | Out-Null
          $gradlew = "$env:GITHUB_WORKSPACE\FreeProjects\Blender\Blender\Utilities-android_arm64\MakeBlender\gradlew.bat"
          Push-Location "$env:GITHUB_WORKSPACE\FreeProjects\Blender\Blender\Utilities-android_arm64\MakeBlender"
          try {
            & $gradlew externalNativeBuildRelease --stacktrace
            Write-Host "gradle exit code: $LASTEXITCODE (non-zero here can be EXPECTED - see note above)"
          } catch {
            Write-Host "gradle threw: $_"
          } finally {
            Pop-Location
            Stop-Transcript | Out-Null
          }

      - name: Check whether libmakesdna.a actually got produced
        shell: pwsh
        run: |
          Start-Transcript -Path "$env:RUNNER_TEMP\transcript\raw.txt" -Append | Out-Null
          try {
            $found = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\FreeProjects\Blender\Blender\Utilities-android_arm64\MakeBlender" -Recurse -Filter "libmakesdna.a" -ErrorAction SilentlyContinue
            if ($found) {
              Write-Host "FOUND libmakesdna.a at:"
              $found | ForEach-Object { Write-Host "  $($_.FullName)" }
              "STAGE2_RESULT=found" | Out-File -FilePath "$env:RUNNER_TEMP\stage2_result.txt"
            } else {
              Write-Host "libmakesdna.a NOT FOUND anywhere under the MakeBlender build tree."
              Write-Host "Listing what DOES exist under app/.cxx (if anything) for diagnosis:"
              Get-ChildItem -Path "$env:GITHUB_WORKSPACE\FreeProjects\Blender\Blender\Utilities-android_arm64\MakeBlender\app\.cxx" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 100 FullName
              "STAGE2_RESULT=not_found" | Out-File -FilePath "$env:RUNNER_TEMP\stage2_result.txt"
            }
          } finally {
            Stop-Transcript | Out-Null
          }
      # raw transcript alongside it, then commit both straight back into
      # the repo. This is the part that matters: Claude cannot fetch
      # GitHub's Actions log/artifact storage from its sandbox (those
      # domains aren't reachable), but it CAN read a normal git commit.
      # So the job reports on itself, in the repo, rather than relying on
      # Claude polling the Actions API for logs.
      - name: Write report and full transcript into automation-reports/
        if: always()
        shell: pwsh
        run: |
          $reportDir = "$env:GITHUB_WORKSPACE\FreeProjects\Blender\Blender\APP-android_arm64\automation-reports"
          New-Item -ItemType Directory -Force -Path $reportDir | Out-Null
          $stamp = Get-Date -Format "yyyy-MM-dd_HHmmss"
          $status = "${{ job.status }}"

          $transcriptSrc = "$env:RUNNER_TEMP\transcript\raw.txt"
          $transcriptDest = "$reportDir\$stamp-stage1-raw-transcript.txt"
          if (Test-Path $transcriptSrc) {
            Copy-Item $transcriptSrc $transcriptDest
          } else {
            "transcript file was not found at $transcriptSrc" | Out-File $transcriptDest
          }

          $stage2Result = "unknown (stage2_result.txt not found)"
          if (Test-Path "$env:RUNNER_TEMP\stage2_result.txt") {
            $stage2Result = Get-Content "$env:RUNNER_TEMP\stage2_result.txt" -Raw
          }

          $reportFile = "$reportDir\$stamp-stage1-setup.md"
          @"
          # Stage 1+2 report - $stamp

          Trigger note: ${{ github.event.inputs.note }}
          Job status: $status
          Runner: windows-latest
          Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Full raw transcript: $stamp-stage1-raw-transcript.txt (committed alongside this file)

          ## Stage 2 result (the actual question this run answers)
          $stage2Result

          ## Steps executed
          - Checked out APP-android_arm64, Blender-android_arm64 (blender-v3.6-release),
            lib-android_arm64, Utilities-android_arm64
          - Linked checkout tree to D:\FreeProjects\Blender\Blender
          - Installed JDK 17, used it to install Android platform 30, NDK 21.4.7075529,
            CMake 3.10.2.4988404 / 3.18.1 / 3.22.1 via sdkmanager, then verified each
            package actually appears in --list_installed (not just that the command exited 0)
          - Switched to JDK 8 for later build steps
          - Attempted makeblender pass 1 via gradlew externalNativeBuildRelease
            (gradle's own exit code is NOT the success signal here - see Stage 2 result above)
          - Searched the MakeBlender build tree for libmakesdna.a

          ## Not attempted in this run
          - MakeSDNA / MakeSRNA compile, install, or on-device execution
          - Any Blender version bump
          - makeblender pass 2 or 3

          ## Notes / next step
          If libmakesdna.a was found, next step is building the MakeSDNA app
          and figuring out how to run it non-interactively via adb on an
          emulator. If not found, read the raw transcript for the actual
          gradle/CMake error - probably a real, new problem, not the
          expected "can't run cross-compiled makesdna" wall.
          "@ | Out-File -FilePath $reportFile -Encoding utf8

          Write-Host "Report written to $reportFile"
          Write-Host "Transcript copied to $transcriptDest"

      - name: Commit report back to the repo
        if: always()
        working-directory: FreeProjects/Blender/Blender/APP-android_arm64
        shell: bash
        run: |
          git config user.name "stage1-ci-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f automation-reports/
          if git diff --cached --quiet; then
            echo "Nothing new to commit"
          else
            git commit -m "Stage 1 run report (status: ${{ job.status }}, run ${{ github.run_id }})"
            git push
          fi

      - name: Also upload as artifact (backup, may not be fetchable by Claude)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage1-report
          path: FreeProjects/Blender/Blender/APP-android_arm64/automation-reports/*
